<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card glass-card border-0 shadow-lg mt-5">
            <div class="card-header bg-transparent border-0 pt-4 pb-0 text-center">
                <h3 class="fw-bold mb-3 text-success">Create Account</h3>
                <ul class="nav nav-pills nav-justified mb-0 flex-column flex-sm-row" id="registerTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-bold" id="reg-citizen-tab" data-bs-toggle="pill" data-bs-target="#reg-citizen" type="button" role="tab" aria-controls="reg-citizen" aria-selected="true"><i class="fas fa-user-plus mb-1 d-block fa-lg"></i>Register Citizen</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold" id="reg-police-tab" data-bs-toggle="pill" data-bs-target="#reg-police" type="button" role="tab" aria-controls="reg-police" aria-selected="false"><i class="fas fa-building-user mb-1 d-block fa-lg"></i>Register Police</button>
                    </li>
                </ul>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <div class="alert alert-danger" ng-if="errorMessage">{{ errorMessage }}</div>
                <div class="alert alert-success" ng-if="successMessage">{{ successMessage }}</div>

                <div class="tab-content" id="registerTabsContent">
                    <!-- Citizen Registration -->
                    <div class="tab-pane fade show active" id="reg-citizen" role="tabpanel" aria-labelledby="reg-citizen-tab">
                        <div class="text-center mb-4">
                            <p class="text-muted">Join the decentralized FIR platform as a Citizen</p>
                        </div>
                        <form ng-submit="registerCitizen()">
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-success"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" ng-model="registerData.username" required placeholder="Choose a username">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-success"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" ng-model="registerData.email" required placeholder="Enter your email">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-success"></i></span>
                                    <input ng-attr-type="{{ showPassword ? 'text' : 'password' }}" class="form-control border-start-0 border-end-0 ps-0" ng-model="registerData.password" required placeholder="Create a password">
                                    <span class="input-group-text bg-light border-start-0 cursor-pointer" ng-click="togglePassword()">
                                        <i class="fas" ng-class="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success text-white py-2 shadow-sm fw-bold">
                                    <i class="fas fa-user-check me-2"></i> Register Citizen
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Police Admin Registration -->
                    <div class="tab-pane fade" id="reg-police" role="tabpanel" aria-labelledby="reg-police-tab">
                        <div class="text-center mb-4">
                            <p class="text-muted">Request Police Administrator verification</p>
                        </div>
                        <form ng-submit="registerAdmin()">
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">Station Badge / Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-id-badge text-dark"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" ng-model="registerData.username" required placeholder="Choose a username">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">Official Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-dark"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" ng-model="registerData.email" required placeholder="Enter official email">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted fw-semibold">Secure Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-key text-dark"></i></span>
                                    <input ng-attr-type="{{ showPassword ? 'text' : 'password' }}" class="form-control border-start-0 border-end-0 ps-0" ng-model="registerData.password" required placeholder="Create a password">
                                    <span class="input-group-text bg-light border-start-0 cursor-pointer" ng-click="togglePassword()">
                                        <i class="fas" ng-class="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                                    </span>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark text-white py-2 shadow-sm fw-bold">
                                    <i class="fas fa-building-shield me-2"></i> Register Police Personnel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-4 border-top pt-4">
                    <p class="mb-0 text-muted">Already have an account? <a href="#!/login" class="text-decoration-none fw-bold text-success">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
