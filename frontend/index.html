<!DOCTYPE html>
<html lang="en" ng-app="firApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decentralized FIR System</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary shadow-sm" ng-controller="NavController">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#!/">
                <i class="fas fa-shield-alt text-warning me-2"></i>BlockFIR
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" ng-if="!isLoggedIn()"><a class="nav-link" href="#!/login">Login</a></li>
                    <li class="nav-item" ng-if="!isLoggedIn()"><a class="nav-link" href="#!/register">Register</a></li>
                    
                    <li class="nav-item" ng-if="isLoggedIn() && hasRole('ROLE_USER')"><a class="nav-link" href="#!/user-dashboard">My FIRs</a></li>
                    <li class="nav-item" ng-if="isLoggedIn() && hasRole('ROLE_USER')"><a class="nav-link" href="#!/map">Station Map</a></li>
                    <li class="nav-item" ng-if="isLoggedIn() && hasRole('ROLE_ADMIN')"><a class="nav-link" href="#!/admin-dashboard">Admin Dashboard</a></li>
                    
                    <li class="nav-item" ng-if="isLoggedIn()">
                        <a class="nav-link text-danger" href="javascript:void(0)" ng-click="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Injection -->
    <div class="container mt-5">
        <div ng-view></div>
    </div>

    <!-- AngularJS 1.8.x -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-window.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- SockJS and STOMP for Real-time SOS -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <!-- App Scripts -->
    <script src="app.js"></script>
    <script src="services/auth.service.js"></script>
    <script src="services/fir.service.js"></script>
    <script src="services/sos.service.js"></script>
    
    <!-- Controllers -->
    <script src="controllers/nav.controller.js"></script>
    <script src="controllers/auth.controller.js"></script>
    <script src="controllers/user.controller.js"></script>
    <script src="controllers/admin.controller.js"></script>
    <script src="controllers/map.controller.js?v=1.2"></script>

</body>
</html>
